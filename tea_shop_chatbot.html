<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manzoor Ahmad's Tea House — Chatbot</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #F5ECD7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #app {
    width: 100%;
    max-width: 520px;
    height: 680px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(78,44,14,0.18);
    border: 1px solid #e8d8c0;
  }

  /* ── Header ── */
  .header {
    background: #4E2C0E;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: #C97D2A;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff; flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 600; color: #fff; }
  .header-sub   { font-size: 12px; color: #C8A87A; margin-top: 2px; }
  .header-status {
    margin-left: auto; display: flex; align-items: center;
    gap: 5px; font-size: 12px; color: #A8D5A2;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; }

  /* ── Quick buttons ── */
  .quick-btns {
    padding: 10px 14px;
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid #f0e8db;
    background: #FAF4EC;
    flex-shrink: 0;
  }
  .qbtn {
    font-size: 11.5px; padding: 5px 11px;
    border: 1px solid #d9c5a8;
    border-radius: 20px;
    background: #fff;
    color: #6B4C2A;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .qbtn:hover { background: #4E2C0E; color: #fff; border-color: #4E2C0E; }

  /* ── Messages ── */
  .messages {
    flex: 1; overflow-y: auto; padding: 14px 14px 10px;
    display: flex; flex-direction: column; gap: 10px;
    background: #FEFAF5;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: #d9c5a8; border-radius: 3px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .bubble {
    max-width: 75%; padding: 10px 14px;
    font-size: 13.5px; line-height: 1.55;
    border-radius: 16px;
  }
  .msg.user .bubble {
    background: #4E2C0E; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #fff; color: #2c1a0a;
    border: 1px solid #e8d8c0;
    border-bottom-left-radius: 4px;
  }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: #C97D2A;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; flex-shrink: 0;
  }

  /* ── Bubble rich content ── */
  .bubble table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 13px; }
  .bubble thead tr { background: #FAF4EC; }
  .bubble th { padding: 6px 8px; font-weight: 600; font-size: 11px; color: #7a5c3a; text-align: left; border-bottom: 2px solid #e8d8c0; text-transform: uppercase; letter-spacing: 0.04em; }
  .bubble th:last-child { text-align: right; }
  .bubble td { padding: 6px 8px; border-bottom: 1px solid #f0e8db; color: #3a2210; vertical-align: top; }
  .bubble td:last-child { text-align: right; font-weight: 600; color: #4E2C0E; white-space: nowrap; }
  .bubble .item-desc { font-size: 11.5px; color: #9a7a5a; margin-top: 2px; }
  .bubble .section-head { font-weight: 600; color: #C97D2A; margin: 8px 0 4px; font-size: 13px; }
  .bubble ul { padding-left: 18px; margin-top: 4px; }
  .bubble ul li { margin-bottom: 3px; font-size: 13px; color: #3a2210; }
  .bubble .stage {
    margin-bottom: 8px; padding: 8px 10px;
    border-radius: 8px; background: #FAF4EC;
    border: 1px solid #e8d8c0;
  }
  .bubble .stage-title { font-weight: 600; font-size: 13px; color: #2c1a0a; }
  .bubble .stage-detail { font-size: 12px; color: #7a5c3a; margin-top: 3px; line-height: 1.5; }

  /* ── Typing animation ── */
  .typing-wrap { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
  .typing-wrap span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #C97D2A; opacity: 0.4;
    animation: blink 1.2s infinite;
    display: inline-block;
  }
  .typing-wrap span:nth-child(2) { animation-delay: 0.2s; }
  .typing-wrap span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.4} 40%{opacity:1} }

  /* ── Input row ── */
  .input-row {
    padding: 10px 14px;
    border-top: 1px solid #f0e8db;
    display: flex; gap: 8px; align-items: center;
    background: #fff; flex-shrink: 0;
  }
  .input-row input {
    flex: 1; font-size: 13.5px; padding: 10px 16px;
    border: 1px solid #d9c5a8;
    border-radius: 24px;
    background: #FAF4EC;
    color: #2c1a0a;
    outline: none;
    font-family: inherit;
  }
  .input-row input:focus { border-color: #C97D2A; background: #fff; }
  .input-row input::placeholder { color: #b09070; }
  .send-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: #4E2C0E; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 17px; transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #6B3A14; }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-avatar"><i class="ti ti-cup"></i></div>
    <div>
      <div class="header-title">Manzoor Ahmad's Tea House</div>
      <div class="header-sub">Mailsi, Punjab &nbsp;|&nbsp; 6:00 AM – 11:00 PM</div>
    </div>
    <div class="header-status"><div class="dot"></div>Online</div>
  </div>

  <div class="quick-btns">
    <button class="qbtn" onclick="sendQ('menu')"><i class="ti ti-list"></i> Menu</button>
    <button class="qbtn" onclick="sendQ('hot drinks')"><i class="ti ti-flame"></i> Hot drinks</button>
    <button class="qbtn" onclick="sendQ('cold drinks')"><i class="ti ti-snowflake"></i> Cold drinks</button>
    <button class="qbtn" onclick="sendQ('snacks')"><i class="ti ti-cookie"></i> Snacks</button>
    <button class="qbtn" onclick="sendQ('promotion')"><i class="ti ti-trending-up"></i> Growth</button>
    <button class="qbtn" onclick="sendQ('owner')"><i class="ti ti-user"></i> Owner</button>
    <button class="qbtn" onclick="sendQ('requirements')"><i class="ti ti-tools"></i> Requirements</button>
    <button class="qbtn" onclick="sendQ('special')"><i class="ti ti-star"></i> Special</button>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="input-row">
    <input id="inp" type="text" placeholder="Type a message or 'order samosa'…" onkeydown="if(event.key==='Enter')handleSend()" />
    <button class="send-btn" onclick="handleSend()" title="Send"><i class="ti ti-send"></i></button>
  </div>
</div>

<script>
const MENU = {
  "doodh patti": {price:48, type:"hot",   desc:"Classic Pakistani milk tea, strong & creamy"},
  "karak chai":  {price:56, type:"hot",   desc:"Extra-strong tea with condensed milk"},
  "green tea":   {price:40, type:"hot",   desc:"Light & refreshing green tea"},
  "kahwa":       {price:64, type:"hot",   desc:"Traditional green tea with cardamom & saffron"},
  "masala chai": {price:56, type:"hot",   desc:"Spiced tea with ginger, cardamom & cinnamon"},
  "black tea":   {price:32, type:"hot",   desc:"Simple desi black tea with sugar"},
  "cold coffee": {price:128, type:"cold",  desc:"Chilled coffee with milk & ice"},
  "lassi":       {price:96, type:"cold",  desc:"Fresh yoghurt-based drink (sweet or salted)"},
  "lemon soda":  {price:80, type:"cold",  desc:"Fresh lemon with chilled soda water"},
  "rusk":        {price:16, type:"snack", desc:"Crispy tea biscuit, perfect with chai"},
  "bun maska":   {price:64, type:"snack", desc:"Soft bun with butter – a tea-time classic"},
  "samosa":      {price:32, type:"snack", desc:"Crispy fried samosa (aloo or keema)"},
  "paratha":     {price:80, type:"snack", desc:"Flaky fried bread, served with chutney"},
  "boiled egg":  {price:40, type:"snack", desc:"Simple boiled egg – a desi breakfast staple"},
  "cake slice":  {price:96, type:"snack", desc:"Homemade sponge cake, fresh daily"},
};

const PROMOS = [
  {level:"🥉 Small tea stall",              inv:"Already achieved!",         inc:"~10,000–20,000 PKR/mo",      desc:"A basic roadside stall — where it all began."},
  {level:"🥈 Proper tea shop (current)",    inv:"50,000–1,00,000 PKR",       inc:"~30,000–60,000 PKR/mo",      desc:"Dedicated shop with seating, counter & full menu."},
  {level:"🥇 Tea café / dhaba",             inv:"2,00,000–5,00,000 PKR",     inc:"~80,000–1,50,000 PKR/mo",    desc:"Expanded café: WiFi, printed menu, delivery."},
  {level:"🏅 Chain of shops (2–3 branches)",inv:"10,00,000+ PKR",            inc:"~2,50,000–5,00,000 PKR/mo",  desc:"Multiple branches in Mailsi under one brand."},
  {level:"🏆 Franchise — Manzoor Tea House",inv:"30,00,000+ PKR",            inc:"Franchise fees + royalties", desc:"A recognised Punjab-wide franchise brand."},
];

const SPECIALS = [
  {name:"Doodh Patti + Rusk combo",  price:56,  note:"Save Rs. 5 — perfect morning deal!"},
  {name:"Karak Chai + Samosa",        price:80,  note:"Strong tea with hot samosa!"},
  {name:"Masala Chai + Bun Maska",    price:104,  note:"Classic evening snack combo!"},
  {name:"Cold Coffee + Cake Slice",   price:192, note:"Cool treat for hot days!"},
];

const EQUIPMENT = ["Large milk pot (degh)","Gas burner / stove","Tea kettle","Cups & saucers (ceramic & disposable)","Glass cups (for karak)","Strainer / sieve","Spoons & ladles","Refrigerator","Blender","Cash box / register","Display counter","Dining tables & chairs","Signboard","Water filter","Generator (load-shedding)"];
const MATERIALS  = ["Loose leaf tea (Lipton / Tapal)","Full-cream milk","Sugar","Cardamom (elaichi)","Ginger (adrak)","Cinnamon sticks","Saffron (for kahwa)","Green tea leaves","Coffee powder","Yoghurt (for lassi)","Lemons","Butter & bread","Samosa pastry & filling","Eggs","Gas cylinders"];
const LICENSES   = ["Trade license from union council","Health & hygiene certificate","Food safety registration (FSSAI)","NTN (tax registration)","Rent agreement (if applicable)"];

const rand = arr => arr[Math.floor(Math.random()*arr.length)];
const cap  = s   => s.replace(/\b\w/g, c => c.toUpperCase());

function getReply(input) {
  const t = input.toLowerCase().trim();

  if (/^(hi|hello|hey|salam|assalam|adaab)/.test(t))
    return rand([
      "Wa Alaikum Assalam! Welcome to Manzoor Ahmad's Tea House! ☕ How can I help you today?",
      "Hello! Great to see you! Type <b>menu</b> to see what we have.",
      "Assalam o Alaikum! Come in and enjoy a fresh cup of chai!"
    ]);

  if (t === "menu" || t === "full menu" || t === "show menu") return buildMenu(null);
  if (/hot (drink|tea|chai|beverag)/.test(t) || t === "hot drinks") return buildMenu("hot");
  if (/cold (drink|beverag|tea)/.test(t) || t === "cold drinks")    return buildMenu("cold");
  if (/snack|food|eat|khana/.test(t) || t === "snacks")            return buildMenu("snack");

  if (t.startsWith("order ")) {
    const item = t.slice(6).trim();
    if (MENU[item]) {
      const m = MENU[item];
      const thanks = rand(["Shukriya! Great choice!","Coming right up!","Manzoor sahab will prepare it fresh!","Excellent taste — won't take long!"]);
      return `<b>Order confirmed:</b> ${cap(item)}<br><br>💰 Price: <b>Rs. ${m.price}</b><br>📝 ${m.desc}<br><br>😊 ${thanks}`;
    }
    return `Sorry, <b>${item}</b> is not on our menu. Type <b>menu</b> to see all items.`;
  }

  if (/shop info|about shop|timing|location|address|hours/.test(t))
    return `<b>Manzoor Ahmad's Tea House</b><br><br>📍 Mailsi, Punjab, Pakistan<br>🕕 Open: 6:00 AM – 11:00 PM (daily)<br>⭐ Specialty: Doodh Patti (milk tea)<br><br>Known for friendly service, fresh milk & great taste!`;

  if (/owner|father|manzoor|who runs/.test(t))
    return `<b>About the owner — Manzoor Ahmad</b><br><br>Manzoor Ahmad is a dedicated tea shop owner in Mailsi, Punjab. He starts work at 6 AM and serves customers with full care until 11 PM, seven days a week.<br><br>His specialty is fresh <em>doodh patti</em>, and his dream is to grow <em>Manzoor Tea House</em> into a recognised brand across Punjab.<br><br>💪 We are proud of him!`;

  if (/promotion|growth|expand|career|grow|future|business plan/.test(t)) return buildPromo();
  if (/requirement|equipment|material|item|tools|need/.test(t))            return buildReq();
  if (/special|offer|deal|discount|today/.test(t))                         return buildSpecial();
  if (/price|cost|kitna/.test(t))
    return `Type <b>menu</b> to see all items with prices, or say <b>order &lt;item name&gt;</b> to place an order.`;
  if (/thank|shukriya|jazak/.test(t))
    return `You're most welcome! Manzoor Ahmad is happy to serve you! 😊`;
  if (/bye|exit|khuda hafiz/.test(t))
    return `Shukriya for visiting! Come back soon. Allah Hafiz! 🙏`;

  return rand([
    `I didn't quite catch that. Try typing <b>menu</b>, <b>promotion</b>, or <b>requirements</b>.`,
    `Not sure what you mean! Use the quick buttons or type <b>menu</b>.`,
    `Hmm — try <b>menu</b>, <b>order samosa</b>, or <b>special</b>!`
  ]);
}

function buildMenu(filter) {
  const types  = filter ? [filter] : ["hot","cold","snack"];
  const labels = {hot:"☕ Hot drinks", cold:"🥤 Cold drinks", snack:"🍽️ Snacks & food"};
  let html = "";
  types.forEach(tp => {
    html += `<div class="section-head">${labels[tp]}</div><table><thead><tr><th>Item Name</th><th>Description</th><th>Price</th></tr></thead><tbody>`;
    Object.entries(MENU).filter(([,v]) => v.type === tp).forEach(([name, v]) => {
      html += `<tr><td><b>${cap(name)}</b></td><td><span class="item-desc">${v.desc}</span></td><td>Rs. ${v.price}</td></tr>`;
    });
    html += `</tbody></table>`;
  });
  return html;
}

function buildPromo() {
  let html = `<b>How Manzoor Ahmad can grow his business</b><br><br>`;
  PROMOS.forEach((p, i) => {
    html += `<div class="stage">
      <div class="stage-title">Stage ${i+1}: ${p.level}</div>
      <div class="stage-detail">💸 ${p.inv} &nbsp;|&nbsp; 💰 ${p.inc}<br>${p.desc}</div>
    </div>`;
  });
  return html;
}

function buildReq() {
  const list = arr => `<ul>${arr.map(i => `<li>${i}</li>`).join("")}</ul>`;
  return `<b>Items needed to run a tea shop</b>
    <div class="section-head">Equipment</div>${list(EQUIPMENT)}
    <div class="section-head">Raw materials</div>${list(MATERIALS)}
    <div class="section-head">Licenses / legal</div>${list(LICENSES)}`;
}

function buildSpecial() {
  const s = rand(SPECIALS);
  return `<b>Today's special offer ⭐</b><br><br>🍽️ <b>${s.name}</b><br>💰 Only Rs. ${s.price}<br>📢 ${s.note}`;
}

function addMsg(html, role) {
  const msgs = document.getElementById("msgs");
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;
  if (role === "bot") {
    wrap.innerHTML = `<div class="msg-avatar"><i class="ti ti-cup"></i></div><div class="bubble">${html}</div>`;
  } else {
    wrap.innerHTML = `<div class="bubble">${html}</div>`;
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("msgs");
  const t = document.createElement("div");
  t.className = "msg bot"; t.id = "typing-indicator";
  t.innerHTML = `<div class="msg-avatar"><i class="ti ti-cup"></i></div><div class="bubble"><div class="typing-wrap"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(t);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function handleSend() {
  const inp = document.getElementById("inp");
  const val = inp.value.trim();
  if (!val) return;
  inp.value = "";
  addMsg(val, "user");
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(getReply(val), "bot");
  }, 500 + Math.random() * 300);
}

function sendQ(q) {
  document.getElementById("inp").value = q;
  handleSend();
}

setTimeout(() => {
  addMsg(
    `Assalam o Alaikum! Welcome to <b>Manzoor Ahmad's Tea House</b> ☕<br><br>I can help you with our menu, place orders, and tell you how our business is growing. Use the quick buttons above or type below!`,
    "bot"
  );
}, 400);
</script>
</body>
</html>
